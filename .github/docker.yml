name: Dashboard CI/CD

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t dashboard-app .

      - name: Tag Image
        run: docker tag dashboard-app ${{ secrets.DOCKER_USERNAME }}/dashboard-app:latest

      - name: Push Image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/dashboard-app:latest